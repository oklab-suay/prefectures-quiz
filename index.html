<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都道府県クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  /* ── タイトル画面 ── */
  #screen-title { text-align: center; }
  #screen-title h1 { font-size: 2rem; color: #4a3f8e; margin-bottom: 8px; }
  #screen-title > p { color: #888; margin-bottom: 20px; font-size: 0.95rem; }

  .mode-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .mode-btn {
    padding: 14px 16px; border-radius: 12px; border: 2px solid transparent;
    cursor: pointer; font-size: 1rem; font-weight: bold;
    transition: all 0.2s; text-align: left; font-family: inherit;
  }
  .mode-btn .mode-title { font-size: 1.05rem; }
  .mode-btn .mode-desc  { font-size: 0.8rem; font-weight: normal; margin-top: 3px; opacity: 0.8; }
  .mode-btn.purple { background: #f0edff; color: #4a3f8e; border-color: #c4b8f5; }
  .mode-btn.red    { background: #fff0ed; color: #8e4a3f; border-color: #f5c4b8; }
  .mode-btn.green  { background: #edfff0; color: #3f8e4a; border-color: #b8f5c4; }
  .mode-btn.blue   { background: #e8f4ff; color: #1a5fa8; border-color: #90c8f5; }
  .mode-btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

  .divider { border: none; border-top: 1px solid #eee; margin: 4px 0; }

  .region-select label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; text-align: left; }
  .region-select select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 2px solid #ddd; font-size: 0.95rem; color: #333;
    background: white; cursor: pointer; margin-bottom: 10px;
  }

  .btn-history {
    display: block; width: 100%; padding: 11px;
    background: #f5f5f5; color: #555; border: none; border-radius: 12px;
    font-size: 0.95rem; cursor: pointer; font-family: inherit;
    transition: background 0.15s; margin-top: 4px;
  }
  .btn-history:hover { background: #ede8ff; color: #4a3f8e; }

  /* ── 共通ボタン ── */
  .btn-primary {
    display: block; width: 100%; padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: bold; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    font-family: inherit; margin-bottom: 10px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    display: block; width: 100%; padding: 12px;
    background: #f5f5f5; color: #555; border: none; border-radius: 12px;
    font-size: 0.95rem; cursor: pointer; font-family: inherit;
    transition: background 0.15s; margin-bottom: 8px;
  }
  .btn-secondary:hover { background: #eee; }

  .back-btn {
    background: none; border: none; cursor: pointer; font-size: 1.3rem;
    color: #888; padding: 4px; line-height: 1; font-family: inherit;
  }
  .back-btn:hover { color: #4a3f8e; }

  /* ── クイズ画面 ── */
  #screen-quiz { display: none; }

  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .progress-text { font-size: 0.85rem; color: #888; }
  .score-badge { background: #f0edff; color: #4a3f8e; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

  .progress-bar-wrap { background: #eee; border-radius: 99px; height: 8px; margin-bottom: 24px; }
  .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 99px; height: 8px; transition: width 0.4s ease; }

  .question-label { font-size: 0.8rem; color: #999; letter-spacing: 1px; margin-bottom: 8px; }
  .question-text { font-size: 1.5rem; font-weight: bold; color: #2d2d2d; margin-bottom: 8px; line-height: 1.8; }
  .question-text ruby rt { font-size: 0.5em; font-weight: normal; color: #888; }
  .question-sub { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 8px; border-radius: 12px; border: 2px solid #e0e0e0; background: #fafafa;
    font-size: 0.95rem; cursor: pointer; transition: all 0.15s;
    font-family: inherit; color: #333; font-weight: 500; line-height: 1.8;
  }
  .choice-btn ruby rt { font-size: 0.55em; font-weight: normal; color: #999; }
  .choice-btn:hover:not(:disabled) { border-color: #764ba2; background: #f5f0ff; color: #4a3f8e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(118,75,162,0.15); }
  .choice-btn.correct { background: #e8f8ec; border-color: #4caf50; color: #2e7d32; animation: pop 0.3s ease; }
  .choice-btn.wrong   { background: #fde8e8; border-color: #f44336; color: #c62828; }
  .choice-btn:disabled { cursor: default; }

  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }

  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.95rem; font-weight: bold; text-align: center; opacity: 0; transition: opacity 0.2s; }
  .feedback.show { opacity: 1; }
  .feedback.ok { background: #e8f8ec; color: #2e7d32; }
  .feedback.ng { background: #fde8e8; color: #c62828; }

  /* ── 結果画面 ── */
  #screen-result { display: none; text-align: center; }
  .result-icon  { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-size: 1.6rem; font-weight: bold; color: #2d2d2d; margin-bottom: 8px; }
  .result-score { font-size: 3rem; font-weight: bold; color: #4a3f8e; margin-bottom: 4px; }
  .result-sub   { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
  .result-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; }
  .stat-box     { text-align: center; }
  .stat-num     { font-size: 1.6rem; font-weight: bold; }
  .stat-label   { font-size: 0.75rem; color: #888; }
  .stat-box.ok .stat-num { color: #4caf50; }
  .stat-box.ng .stat-num { color: #f44336; }
  .best-score-badge { display: inline-block; background: #fff8e1; border: 2px solid #ffd54f; color: #f57f17; border-radius: 20px; padding: 4px 14px; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; }
  .missed-section { text-align: left; margin-bottom: 20px; }
  .missed-title   { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
  .missed-list    { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  .missed-item    { background: #fde8e8; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; color: #c62828; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .missed-item ruby rt { font-size: 0.6em; }
  .missed-item .arrow  { color: #bbb; flex-shrink: 0; }

  /* ── 履歴画面 ── */
  #screen-history { display: none; }
  .history-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .history-header h2 { font-size: 1.3rem; color: #2d2d2d; }
  .ranking-section { margin-bottom: 24px; }
  .section-label   { font-size: 0.8rem; color: #999; letter-spacing: 1px; margin-bottom: 10px; }
  .top3      { display: flex; gap: 8px; margin-bottom: 16px; }
  .top3-item { flex: 1; text-align: center; padding: 12px 6px; border-radius: 12px; background: #f8f8f8; border: 2px solid #eee; }
  .top3-item:nth-child(1) { background: #fff8e1; border-color: #ffd54f; }
  .top3-item:nth-child(2) { background: #f5f5f5; border-color: #bdbdbd; }
  .top3-item:nth-child(3) { background: #fff3e0; border-color: #ffcc80; }
  .top3-medal { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .top3-score { font-size: 1.2rem; font-weight: bold; color: #2d2d2d; }
  .top3-pct   { font-size: 0.75rem; color: #888; }
  .top3-mode  { font-size: 0.7rem; color: #aaa; margin-top: 2px; }
  .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .history-item { background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .history-item .h-left  { display: flex; flex-direction: column; gap: 2px; }
  .history-item .h-date  { font-size: 0.75rem; color: #bbb; }
  .history-item .h-mode  { font-size: 0.85rem; color: #666; }
  .history-item .h-score { font-size: 1.1rem; font-weight: bold; color: #4a3f8e; }
  .h-pct { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
  .h-pct.great { background: #e8f8ec; color: #2e7d32; }
  .h-pct.good  { background: #e8f0ff; color: #3949ab; }
  .h-pct.ok    { background: #fff8e1; color: #f57f17; }
  .h-pct.low   { background: #fde8e8; color: #c62828; }
  .no-history { text-align: center; padding: 40px 20px; color: #ccc; font-size: 0.95rem; }
  .clear-btn  { background: none; border: 1px solid #eee; color: #bbb; border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .clear-btn:hover { border-color: #f44336; color: #f44336; }

  /* ════════════════════════════════
     📖 フラッシュカード画面
  ════════════════════════════════ */
  #screen-flash { display: none; }

  .flash-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }
  .flash-header-left { display: flex; align-items: center; gap: 8px; }
  .flash-header h2   { font-size: 1.1rem; color: #2d2d2d; }

  /* 進捗バー */
  .flash-progress-wrap {
    background: #eee; border-radius: 99px; height: 8px; margin-bottom: 6px;
  }
  .flash-progress-bar {
    background: linear-gradient(90deg, #4caf50, #66bb6a);
    border-radius: 99px; height: 8px; transition: width 0.4s ease;
  }
  .flash-count {
    font-size: 0.82rem; color: #888; margin-bottom: 14px; text-align: right;
  }
  .flash-count b { color: #4caf50; }

  /* ヒントテキスト */
  .flash-hint {
    font-size: 0.78rem; color: #bbb; text-align: center;
    margin-bottom: 10px;
  }

  /* カードグリッド */
  .flash-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  /* 1枚のカード */
  .fc {
    aspect-ratio: 3/4;
    perspective: 700px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }
  .fc.done { opacity: 0.35; pointer-events: none; }

  .fc-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 12px;
  }
  .fc.open .fc-inner { transform: rotateY(180deg); }

  .fc-front, .fc-back {
    position: absolute; inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 4px;
    text-align: center;
  }

  /* 表面：都道府県 */
  .fc-front {
    background: linear-gradient(145deg, #f0edff, #e4deff);
    border: 2px solid #c4b8f5;
  }
  .fc-front .fc-pref {
    font-size: 0.82rem;
    font-weight: bold;
    color: #4a3f8e;
    line-height: 1.6;
  }
  .fc-front .fc-pref ruby rt { font-size: 0.65em; font-weight: normal; color: #9980e0; }
  .fc-front .fc-tap {
    font-size: 0.6rem;
    color: #b8a8f5;
    margin-top: 6px;
  }

  /* 裏面：県庁所在地 */
  .fc-back {
    background: linear-gradient(145deg, #fff3ed, #ffe4d6);
    border: 2px solid #f5c4b8;
    transform: rotateY(180deg);
  }
  .fc-back .fc-capital {
    font-size: 0.9rem;
    font-weight: bold;
    color: #8e4a3f;
    line-height: 1.6;
  }
  .fc-back .fc-capital ruby rt { font-size: 0.65em; font-weight: normal; color: #e09080; }

  /* 覚えた！ボタン */
  .fc-check {
    margin-top: 8px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.7rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .fc-check:hover { background: #43a047; transform: scale(1.05); }

  /* 覚えた済み：緑枠 */
  .fc.done .fc-back {
    background: linear-gradient(145deg, #e8f8ec, #d4f0da);
    border-color: #4caf50;
  }

  /* 下部ボタン */
  .flash-actions { display: flex; gap: 8px; margin-bottom: 0; }
  .flash-actions .btn-primary   { margin-bottom: 0; }
  .flash-actions .btn-secondary { margin-bottom: 0; flex: 1; }

  /* クリア */
  .flash-clear { display: none; text-align: center; padding: 8px 0; }
  .flash-clear.show { display: block; }
  .flash-clear-icon  { font-size: 3.5rem; margin-bottom: 8px; }
  .flash-clear-title { font-size: 1.4rem; font-weight: bold; color: #2d2d2d; margin-bottom: 6px; }
  .flash-clear-sub   { font-size: 0.9rem; color: #888; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">

  <!-- ════ タイトル画面 ════ -->
  <div id="screen-title">
    <h1>🗾 都道府県クイズ</h1>
    <p>都道府県と県庁所在地を覚えよう！</p>

    <div class="mode-buttons">
      <button class="mode-btn purple" onclick="startQuiz('capital')">
        <div class="mode-title">🏙️ 県庁所在地を答えろ！</div>
        <div class="mode-desc">都道府県名 → 県庁所在地を4択で選ぶ</div>
      </button>
      <button class="mode-btn red" onclick="startQuiz('prefecture')">
        <div class="mode-title">🗺️ 都道府県を答えろ！</div>
        <div class="mode-desc">県庁所在地 → 都道府県名を4択で選ぶ</div>
      </button>
      <button class="mode-btn green" onclick="startQuiz('both')">
        <div class="mode-title">🎯 ミックスモード</div>
        <div class="mode-desc">両方がランダムに出題される（難しい！）</div>
      </button>
      <hr class="divider">
      <button class="mode-btn blue" onclick="startFlash()">
        <div class="mode-title">📖 フラッシュカード</div>
        <div class="mode-desc">カードをタップして県庁所在地を確認。「覚えた！」で仕分けしよう</div>
      </button>
    </div>

    <div class="region-select">
      <label>出題エリアを選ぶ</label>
      <select id="region-select">
        <option value="all">全国（47都道府県）</option>
        <option value="hokkaido">北海道・東北</option>
        <option value="kanto">関東</option>
        <option value="chubu">中部</option>
        <option value="kinki">近畿</option>
        <option value="chugoku">中国・四国</option>
        <option value="kyushu">九州・沖縄</option>
      </select>
    </div>

    <button class="btn-history" onclick="showHistory()">📊 スコア履歴・ランキングを見る</button>
  </div>

  <!-- ════ クイズ画面 ════ -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <span class="progress-text" id="progress-text">1 / 10</span>
      <span class="score-badge"   id="score-badge">0点</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="question-label" id="question-label"></div>
    <div class="question-text"  id="question-text"></div>
    <div class="question-sub"   id="question-sub"></div>
    <div class="choices"        id="choices"></div>
    <div class="feedback"       id="feedback"></div>
  </div>

  <!-- ════ 結果画面 ════ -->
  <div id="screen-result">
    <div class="result-icon"  id="result-icon">🎉</div>
    <div class="result-title" id="result-title"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-sub">正解数</div>
    <div id="best-score-wrap"></div>
    <div class="result-stats">
      <div class="stat-box ok"><div class="stat-num" id="stat-ok">0</div><div class="stat-label">正解</div></div>
      <div class="stat-box ng"><div class="stat-num" id="stat-ng">0</div><div class="stat-label">不正解</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-pct" style="color:#4a3f8e">0%</div><div class="stat-label">正答率</div></div>
    </div>
    <div class="missed-section" id="missed-section">
      <div class="missed-title">間違えた問題</div>
      <div class="missed-list"  id="missed-list"></div>
    </div>
    <button class="btn-primary"   onclick="retryQuiz()">もう一度！</button>
    <button class="btn-secondary" onclick="showHistory()">📊 履歴・ランキングを見る</button>
    <button class="btn-secondary" onclick="goTitle()">タイトルへ戻る</button>
  </div>

  <!-- ════ 履歴・ランキング画面 ════ -->
  <div id="screen-history">
    <div class="history-header">
      <button class="back-btn" onclick="goTitle()">←</button>
      <h2>📊 スコア履歴・ランキング</h2>
    </div>
    <div class="ranking-section">
      <div class="section-label">🏆 ベスト3</div>
      <div class="top3" id="top3"></div>
    </div>
    <div class="ranking-section">
      <div class="section-label">📋 最近の記録</div>
      <div class="history-list" id="history-list"></div>
    </div>
    <div style="text-align:center">
      <button class="clear-btn" onclick="clearHistory()">🗑️ 履歴を全部消す</button>
    </div>
  </div>

  <!-- ════ フラッシュカード画面 ════ -->
  <div id="screen-flash">

    <!-- ヘッダー -->
    <div class="flash-header">
      <div class="flash-header-left">
        <button class="back-btn" onclick="goTitle()">←</button>
        <h2>📖 フラッシュカード</h2>
      </div>
      <button class="back-btn" onclick="startFlash()" title="リセット">🔄</button>
    </div>

    <!-- 進捗 -->
    <div class="flash-progress-wrap">
      <div class="flash-progress-bar" id="flash-pb" style="width:0%"></div>
    </div>
    <div class="flash-count" id="flash-count">覚えた <b>0</b> / 0 枚</div>

    <div class="flash-hint">カードをタップ → 県庁所在地が出るよ ✦ 覚えたら「覚えた！」を押そう</div>

    <!-- カードグリッド -->
    <div class="flash-grid" id="flash-grid"></div>

    <!-- クリア表示 -->
    <div class="flash-clear" id="flash-clear">
      <div class="flash-clear-icon">🎊</div>
      <div class="flash-clear-title">全部覚えた！！</div>
      <div class="flash-clear-sub" id="flash-clear-sub"></div>
      <button class="btn-primary"   onclick="startFlash()">もう一度！</button>
      <button class="btn-secondary" onclick="flashRetryRemaining()">まだのカードだけやり直す</button>
      <button class="btn-secondary" onclick="goTitle()">タイトルへ戻る</button>
    </div>

    <!-- 下部アクション（クリア前） -->
    <div class="flash-actions" id="flash-actions">
      <button class="btn-secondary" style="flex:1" onclick="flashOpenAll()">全部めくる</button>
      <button class="btn-secondary" style="flex:1" onclick="flashCloseAll()">全部閉じる</button>
    </div>

  </div>

</div><!-- /card -->

<script>
/* ══════════════════════════════════════
   データ（ふりがな付き）
══════════════════════════════════════ */
const DATA = [
  { pref:"北海道",  prefK:"ほっかいどう", capital:"札幌市",    capitalK:"さっぽろし",   region:"hokkaido" },
  { pref:"青森県",  prefK:"あおもりけん", capital:"青森市",    capitalK:"あおもりし",   region:"hokkaido" },
  { pref:"岩手県",  prefK:"いわてけん",   capital:"盛岡市",    capitalK:"もりおかし",   region:"hokkaido" },
  { pref:"宮城県",  prefK:"みやぎけん",   capital:"仙台市",    capitalK:"せんだいし",   region:"hokkaido" },
  { pref:"秋田県",  prefK:"あきたけん",   capital:"秋田市",    capitalK:"あきたし",     region:"hokkaido" },

  { pref:"大分県",  prefK:"おおいたけん", capital:"大分市",    capitalK:"おおいたし",   region:"kyushu" },
  { pref:"宮崎県",  prefK:"みやざきけん", capital:"宮崎市",    capitalK:"みやざきし",   region:"kyushu" },
  { pref:"鹿児島県",prefK:"かごしまけん", capital:"鹿児島市",  capitalK:"かごしまし",   region:"kyushu" },
  { pref:"沖縄県",  prefK:"おきなわけん", capital:"那覇市",    capitalK:"なはし",       region:"kyushu" },
];

const QUIZ_COUNT  = 10;
const STORAGE_KEY = "prefQuizHistory";

/* ── クイズ状態 ── */
let questions    = [];
let currentIndex = 0;
let score        = 0;
let missed       = [];
let currentMode  = "capital";
let currentRegion= "all";
let answered     = false;

/* ── フラッシュカード状態 ── */
let flashCards    = [];   // { data, done }
let flashDoneCount= 0;

/* ══════════════════
   ユーティリティ
══════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ruby(text, kana) {
  return `<ruby>${text}<rt>${kana}</rt></ruby>`;
}

function modeLabel(mode) {
  return { capital:"県庁所在地モード", prefecture:"都道府県モード",
           both:"ミックスモード", flash:"フラッシュカード" }[mode] || mode;
}

function regionLabel(r) {
  return { all:"全国", hokkaido:"北海道・東北", kanto:"関東",
           chubu:"中部", kinki:"近畿", chugoku:"中国・四国", kyushu:"九州・沖縄" }[r] || r;
}

function nowStr() {
  return new Date().toLocaleString("ja-JP",
    { month:"numeric", day:"numeric", hour:"2-digit", minute:"2-digit" });
}

function allScreensOff() {
  ["screen-title","screen-quiz","screen-result","screen-history","screen-flash"]
    .forEach(id => document.getElementById(id).style.display = "none");
}

/* ══════════════════
   localStorage
══════════════════ */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}

function saveRecord(rec) {
  const h = loadHistory();
  h.unshift(rec);
  if (h.length > 50) h.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}

function clearHistory() {
  if (!confirm("履歴を全部消しますか？")) return;
  localStorage.removeItem(STORAGE_KEY);
  showHistory();
}

/* ══════════════════
   タイトル
══════════════════ */
function goTitle() {
  allScreensOff();
  document.getElementById("screen-title").style.display = "block";
}

/* ══════════════════
   4択クイズ
══════════════════ */
function startQuiz(mode) {
  currentMode   = mode;
  currentRegion = document.getElementById("region-select").value;
  const pool    = currentRegion === "all" ? DATA : DATA.filter(d => d.region === currentRegion);
  questions     = shuffle(pool).slice(0, Math.min(QUIZ_COUNT, pool.length));
  currentIndex  = 0; score = 0; missed = [];
  allScreensOff();
  document.getElementById("screen-quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  answered = false;
  const total = questions.length;
  const q     = questions[currentIndex];
  let isCapitalMode = currentMode === "capital" ? true
                    : currentMode === "prefecture" ? false
                    : Math.random() < 0.5;
  q._isCapitalMode = isCapitalMode;

  document.getElementById("progress-text").textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById("score-badge").textContent   = `${score}点`;
  document.getElementById("progress-bar").style.width  = `${(currentIndex / total) * 100}%`;

  if (isCapitalMode) {
    document.getElementById("question-label").textContent = "都道府県 → 県庁所在地";
    document.getElementById("question-text").innerHTML    = ruby(q.pref, q.prefK);
    document.getElementById("question-sub").textContent   = "の県庁所在地はどこ？";
  } else {
    document.getElementById("question-label").textContent = "県庁所在地 → 都道府県";
    document.getElementById("question-text").innerHTML    = ruby(q.capital, q.capitalK);
    document.getElementById("question-sub").textContent   = "が県庁所在地の都道府県はどれ？";
  }

  const correctText = isCapitalMode ? q.capital  : q.pref;
  const correctKana = isCapitalMode ? q.capitalK : q.prefK;
  const wrongs = shuffle(DATA.filter(d => d.pref !== q.pref)).slice(0, 3).map(d =>
    isCapitalMode ? { text: d.capital, kana: d.capitalK } : { text: d.pref, kana: d.prefK }
  );
  const choices = shuffle([{ text: correctText, kana: correctKana }, ...wrongs]);

  const container = document.getElementById("choices");
  container.innerHTML = "";
  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = ruby(c.text, c.kana);
    btn.dataset.value = c.text;
    btn.onclick = () => selectAnswer(btn, c.text, correctText, q, isCapitalMode);
    container.appendChild(btn);
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback"; fb.textContent = "";
}

function selectAnswer(btn, selected, correct, q, isCapitalMode) {
  if (answered) return;
  answered = true;
  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    if (b.dataset.value === correct) b.classList.add("correct");
  });
  const fb = document.getElementById("feedback");
  if (selected === correct) {
    score++; btn.classList.add("correct");
    fb.textContent = "⭕ 正解！"; fb.className = "feedback ok show";
  } else {
    btn.classList.add("wrong");
    const ck = isCapitalMode ? q.capitalK : q.prefK;
    fb.innerHTML = `❌ 不正解… 正解は「${ruby(correct, ck)}」`;
    fb.className = "feedback ng show";
    missed.push({ q, isCapitalMode });
  }
  document.getElementById("score-badge").textContent = `${score}点`;
  setTimeout(() => { currentIndex++; currentIndex < questions.length ? showQuestion() : showResult(); }, 1200);
}

function showResult() {
  allScreensOff();
  document.getElementById("screen-result").style.display = "block";
  const total = questions.length;
  const pct   = Math.round((score / total) * 100);
  saveRecord({ date: nowStr(), mode: currentMode, region: currentRegion, score, total, pct });

  const history  = loadHistory();
  const same     = history.filter(h => h.mode === currentMode && h.total === total);
  const bestPct  = Math.max(...same.map(h => h.pct));
  const isNewBest= same.length === 1 || (pct === bestPct && same.filter(h => h.pct === bestPct).length === 1);
  document.getElementById("best-score-wrap").innerHTML =
    isNewBest && pct > 0 ? `<div class="best-score-badge">🌟 自己ベスト更新！</div>`
    : bestPct > 0 && same.length > 1 ? `<div class="best-score-badge">📈 自己ベスト：${bestPct}%</div>` : "";

  let icon, title;
  if      (pct===100) { icon="🏆"; title="パーフェクト！！！"; }
  else if (pct>= 80)  { icon="🎉"; title="すごい！よくできました！"; }
  else if (pct>= 60)  { icon="😊"; title="なかなかいいね！"; }
  else if (pct>= 40)  { icon="😅"; title="もう少し！練習しよう"; }
  else                { icon="😢"; title="がんばれ！また挑戦！"; }

  document.getElementById("result-icon").textContent  = icon;
  document.getElementById("result-title").textContent = title;
  document.getElementById("result-score").textContent = `${score} / ${total}`;
  document.getElementById("stat-ok").textContent = score;
  document.getElementById("stat-ng").textContent = total - score;
  document.getElementById("stat-pct").textContent = pct + "%";

  const missedSection = document.getElementById("missed-section");
  const missedList    = document.getElementById("missed-list");
  missedList.innerHTML = "";
  if (missed.length === 0) { missedSection.style.display = "none"; return; }
  missedSection.style.display = "block";
  missed.forEach(({ q, isCapitalMode }) => {
    const div = document.createElement("div");
    div.className = "missed-item";
    div.innerHTML = isCapitalMode
      ? `<span>${ruby(q.pref,q.prefK)}</span><span class="arrow">→</span><span>${ruby(q.capital,q.capitalK)}</span>`
      : `<span>${ruby(q.capital,q.capitalK)}</span><span class="arrow">→</span><span>${ruby(q.pref,q.prefK)}</span>`;
    missedList.appendChild(div);
  });
}

function retryQuiz() { startQuiz(currentMode); }

/* ══════════════════
   履歴・ランキング
══════════════════ */
function showHistory() {
  allScreensOff();
  document.getElementById("screen-history").style.display = "block";
  const history = loadHistory();
  const top3El  = document.getElementById("top3");
  const sorted  = [...history].sort((a,b) => b.pct - a.pct || b.score - a.score);
  const top3    = sorted.slice(0, 3);

  if (!top3.length) {
    top3El.innerHTML = `<div style="color:#ccc;font-size:0.9rem;padding:12px">まだ記録がありません</div>`;
  } else {
    top3El.innerHTML = "";
    const order      = top3.length>=3 ? [top3[1],top3[0],top3[2]] : top3.length===2 ? [top3[1],top3[0]] : [top3[0]];
    const medalOrder = top3.length>=3 ? ["🥈","🥇","🥉"] : top3.length===2 ? ["🥈","🥇"] : ["🥇"];
    order.forEach((item,i) => {
      if (!item) return;
      const div = document.createElement("div");
      div.className = "top3-item";
      div.innerHTML = `<span class="top3-medal">${medalOrder[i]}</span>
        <div class="top3-score">${item.score}/${item.total}</div>
        <div class="top3-pct">${item.pct}%</div>
        <div class="top3-mode">${modeLabel(item.mode)}</div>`;
      top3El.appendChild(div);
    });
  }

  const listEl = document.getElementById("history-list");
  if (!history.length) {
    listEl.innerHTML = `<div class="no-history">📭 まだ記録がありません<br>クイズに挑戦しよう！</div>`; return;
  }
  listEl.innerHTML = "";
  history.forEach(h => {
    const pc = h.pct===100?"great":h.pct>=70?"good":h.pct>=40?"ok":"low";
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <div class="h-left">
        <span class="h-date">${h.date}　${regionLabel(h.region||"all")}</span>
        <span class="h-mode">${modeLabel(h.mode)}</span>
      </div>
      <div style="text-align:right">
        <div class="h-score">${h.score} / ${h.total}</div>
        <span class="h-pct ${pc}">${h.pct}%</span>
      </div>`;
    listEl.appendChild(div);
  });
}

/* ══════════════════════════════════════
   📖 フラッシュカード
══════════════════════════════════════ */
function startFlash() {
  const region = document.getElementById("region-select").value;
  const pool   = region === "all" ? DATA : DATA.filter(d => d.region === region);
  flashCards   = shuffle(pool).map(d => ({ data: d, done: false }));
  flashDoneCount = 0;

  allScreensOff();
  document.getElementById("screen-flash").style.display = "block";
  document.getElementById("flash-clear").classList.remove("show");
  document.getElementById("flash-actions").style.display = "flex";

  renderFlashGrid(flashCards);
  updateFlashProgress();
}

/* まだのカードだけ再表示 */
function flashRetryRemaining() {
  const remaining = flashCards.filter(c => !c.done);
  if (!remaining.length) { startFlash(); return; }
  flashCards = shuffle(remaining).map(c => ({ data: c.data, done: false }));
  flashDoneCount = 0;
  document.getElementById("flash-clear").classList.remove("show");
  document.getElementById("flash-actions").style.display = "flex";
  renderFlashGrid(flashCards);
  updateFlashProgress();
}

function renderFlashGrid(cards) {
  const grid = document.getElementById("flash-grid");
  grid.innerHTML = "";
  cards.forEach((c, i) => {
    const el = document.createElement("div");
    el.className  = "fc";
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="fc-inner">
        <div class="fc-front">
          <div class="fc-pref">${ruby(c.data.pref, c.data.prefK)}</div>
          <div class="fc-tap">タップ↓</div>
        </div>
        <div class="fc-back">
          <div class="fc-capital">${ruby(c.data.capital, c.data.capitalK)}</div>
          <button class="fc-check" onclick="markDone(event,${i})">覚えた！✓</button>
        </div>
      </div>`;
    el.addEventListener("click", () => toggleFlipCard(el));
    grid.appendChild(el);
  });
}

function toggleFlipCard(el) {
  if (el.classList.contains("done")) return;
  el.classList.toggle("open");
}

function markDone(e, idx) {
  e.stopPropagation();   // カードのクリックイベントに伝播させない
  const grid = document.getElementById("flash-grid");
  const card = grid.querySelector(`.fc[data-idx="${idx}"]`);
  if (!card || card.classList.contains("done")) return;

  card.classList.add("done");
  flashCards[idx].done = true;
  flashDoneCount++;
  updateFlashProgress();

  if (flashDoneCount === flashCards.length) {
    setTimeout(showFlashClear, 400);
  }
}

function updateFlashProgress() {
  const total = flashCards.length;
  const pct   = total ? Math.round((flashDoneCount / total) * 100) : 0;
  document.getElementById("flash-pb").style.width = pct + "%";
  document.getElementById("flash-count").innerHTML =
    `覚えた <b>${flashDoneCount}</b> / ${total} 枚`;
}

function flashOpenAll() {
  document.querySelectorAll(".fc:not(.done)").forEach(el => el.classList.add("open"));
}

function flashCloseAll() {
  document.querySelectorAll(".fc:not(.done)").forEach(el => el.classList.remove("open"));
}

function showFlashClear() {
  document.getElementById("flash-clear").classList.add("show");
  document.getElementById("flash-actions").style.display = "none";
  document.getElementById("flash-clear-sub").textContent =
    `${flashCards.length}枚のカードを全部マスター！すごい！`;

  saveRecord({
    date: nowStr(),
    mode: "flash",
    region: document.getElementById("region-select").value,
    score: flashCards.length,
    total: flashCards.length,
    pct: 100
  });
}
</script>
