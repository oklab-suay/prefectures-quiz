<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都道府県クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  /* ── タイトル画面 ── */
  #screen-title { text-align: center; }
  #screen-title h1 { font-size: 2rem; color: #4a3f8e; margin-bottom: 8px; }
  #screen-title p { color: #888; margin-bottom: 28px; font-size: 0.95rem; }

  .mode-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .mode-btn {
    padding: 16px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
    transition: all 0.2s;
    text-align: left;
  }
  .mode-btn .mode-title { font-size: 1.05rem; }
  .mode-btn .mode-desc { font-size: 0.8rem; font-weight: normal; margin-top: 4px; opacity: 0.8; }
  .mode-btn:nth-child(1) { background: #f0edff; color: #4a3f8e; border-color: #c4b8f5; }
  .mode-btn:nth-child(2) { background: #fff0ed; color: #8e4a3f; border-color: #f5c4b8; }
  .mode-btn:nth-child(3) { background: #edfff0; color: #3f8e4a; border-color: #b8f5c4; }
  .mode-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }

  .region-select label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
  .region-select select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 2px solid #ddd; font-size: 0.95rem; color: #333;
    background: white; cursor: pointer;
  }

  /* ── クイズ画面 ── */
  #screen-quiz { display: none; }

  .quiz-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 20px;
  }
  .progress-text { font-size: 0.85rem; color: #888; }
  .score-badge {
    background: #f0edff; color: #4a3f8e;
    padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
  }

  .progress-bar-wrap { background: #eee; border-radius: 99px; height: 8px; margin-bottom: 24px; }
  .progress-bar {
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 99px; height: 8px;
    transition: width 0.4s ease;
  }

  .question-label {
    font-size: 0.8rem; color: #999; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .question-text {
    font-size: 1.5rem; font-weight: bold; color: #2d2d2d;
    margin-bottom: 8px; line-height: 1.4;
  }
  .question-sub { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 10px; border-radius: 12px;
    border: 2px solid #e0e0e0; background: #fafafa;
    font-size: 1rem; cursor: pointer; transition: all 0.15s;
    font-family: inherit; color: #333; font-weight: 500;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: #764ba2; background: #f5f0ff; color: #4a3f8e;
    transform: translateY(-2px); box-shadow: 0 4px 12px rgba(118,75,162,0.15);
  }
  .choice-btn.correct {
    background: #e8f8ec; border-color: #4caf50; color: #2e7d32;
    animation: pop 0.3s ease;
  }
  .choice-btn.wrong {
    background: #fde8e8; border-color: #f44336; color: #c62828;
  }
  .choice-btn:disabled { cursor: default; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  .feedback {
    margin-top: 16px; padding: 12px 16px; border-radius: 10px;
    font-size: 0.95rem; font-weight: bold; text-align: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .feedback.show { opacity: 1; }
  .feedback.ok { background: #e8f8ec; color: #2e7d32; }
  .feedback.ng { background: #fde8e8; color: #c62828; }

  /* ── 結果画面 ── */
  #screen-result { display: none; text-align: center; }
  .result-icon { font-size: 4rem; margin-bottom: 12px; }
  .result-title { font-size: 1.6rem; font-weight: bold; color: #2d2d2d; margin-bottom: 8px; }
  .result-score { font-size: 3rem; font-weight: bold; color: #4a3f8e; margin-bottom: 4px; }
  .result-sub { color: #888; font-size: 0.9rem; margin-bottom: 28px; }

  .result-stats {
    display: flex; justify-content: center; gap: 24px; margin-bottom: 28px;
  }
  .stat-box { text-align: center; }
  .stat-num { font-size: 1.6rem; font-weight: bold; }
  .stat-label { font-size: 0.75rem; color: #888; }
  .stat-box.ok .stat-num { color: #4caf50; }
  .stat-box.ng .stat-num { color: #f44336; }

  .missed-section { text-align: left; margin-bottom: 24px; }
  .missed-title { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
  .missed-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
  .missed-item {
    background: #fde8e8; border-radius: 8px; padding: 8px 12px;
    font-size: 0.85rem; color: #c62828;
    display: flex; justify-content: space-between;
  }
  .missed-item span { color: #888; }

  .btn-primary {
    display: block; width: 100%; padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: bold; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    font-family: inherit; margin-bottom: 10px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    display: block; width: 100%; padding: 12px;
    background: #f5f5f5; color: #555; border: none; border-radius: 12px;
    font-size: 0.95rem; cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: #eee; }
</style>
</head>
<body>
<div class="card">

  <!-- タイトル画面 -->
  <div id="screen-title">
    <h1>🗾 都道府県クイズ</h1>
    <p>都道府県と県庁所在地を覚えよう！</p>

    <div class="mode-buttons">
      <button class="mode-btn" onclick="startQuiz('capital')">
        <div class="mode-title">🏙️ 県庁所在地を答えろ！</div>
        <div class="mode-desc">都道府県名 → 県庁所在地を4択で選ぶ</div>
      </button>
      <button class="mode-btn" onclick="startQuiz('prefecture')">
        <div class="mode-title">🗺️ 都道府県を答えろ！</div>
        <div class="mode-desc">県庁所在地 → 都道府県名を4択で選ぶ</div>
      </button>
      <button class="mode-btn" onclick="startQuiz('both')">
        <div class="mode-title">🎯 ミックスモード</div>
        <div class="mode-desc">両方がランダムに出題される（難しい！）</div>
      </button>
    </div>

    <div class="region-select">
      <label>出題エリアを選ぶ</label>
      <select id="region-select">
        <option value="all">全国（47都道府県）</option>
        <option value="hokkaido">北海道・東北</option>
        <option value="kanto">関東</option>
        <option value="chubu">中部</option>
        <option value="kinki">近畿</option>
        <option value="chugoku">中国・四国</option>
        <option value="kyushu">九州・沖縄</option>
      </select>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <span class="progress-text" id="progress-text">1 / 10</span>
      <span class="score-badge" id="score-badge">0点</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="question-label" id="question-label">都道府県 → 県庁所在地</div>
    <div class="question-text" id="question-text">北海道</div>
    <div class="question-sub" id="question-sub">の県庁所在地はどこ？</div>

    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result">
    <div class="result-icon" id="result-icon">🎉</div>
    <div class="result-title" id="result-title">すごい！</div>
    <div class="result-score" id="result-score">10 / 10</div>
    <div class="result-sub">正解数</div>

    <div class="result-stats">
      <div class="stat-box ok">
        <div class="stat-num" id="stat-ok">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-box ng">
        <div class="stat-num" id="stat-ng">0</div>
        <div class="stat-label">不正解</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-pct" style="color:#4a3f8e">0%</div>
        <div class="stat-label">正答率</div>
      </div>
    </div>

    <div class="missed-section" id="missed-section">
      <div class="missed-title">間違えた問題</div>
      <div class="missed-list" id="missed-list"></div>
    </div>

    <button class="btn-primary" id="retry-btn" onclick="retryQuiz()">もう一度！</button>
    <button class="btn-secondary" onclick="goTitle()">タイトルへ戻る</button>
  </div>

</div>

<script>
const DATA = [
  // 北海道・東北
  { pref: "北海道", capital: "札幌市", region: "hokkaido" },
  { pref: "青森県", capital: "青森市", region: "hokkaido" },
  { pref: "岩手県", capital: "盛岡市", region: "hokkaido" },
  { pref: "宮城県", capital: "仙台市", region: "hokkaido" },
  { pref: "秋田県", capital: "秋田市", region: "hokkaido" },
  { pref: "山形県", capital: "山形市", region: "hokkaido" },
  { pref: "福島県", capital: "福島市", region: "hokkaido" },
  // 関東
  { pref: "茨城県", capital: "水戸市", region: "kanto" },
  { pref: "栃木県", capital: "宇都宮市", region: "kanto" },
  { pref: "群馬県", capital: "前橋市", region: "kanto" },
  { pref: "埼玉県", capital: "さいたま市", region: "kanto" },
  { pref: "千葉県", capital: "千葉市", region: "kanto" },
  { pref: "東京都", capital: "新宿区（都庁）", region: "kanto" },
  { pref: "神奈川県", capital: "横浜市", region: "kanto" },
  // 中部
  { pref: "新潟県", capital: "新潟市", region: "chubu" },
  { pref: "富山県", capital: "富山市", region: "chubu" },
  { pref: "石川県", capital: "金沢市", region: "chubu" },
  { pref: "福井県", capital: "福井市", region: "chubu" },
  { pref: "山梨県", capital: "甲府市", region: "chubu" },
  { pref: "長野県", capital: "長野市", region: "chubu" },
  { pref: "岐阜県", capital: "岐阜市", region: "chubu" },
  { pref: "静岡県", capital: "静岡市", region: "chubu" },
  { pref: "愛知県", capital: "名古屋市", region: "chubu" },
  // 近畿
  { pref: "三重県", capital: "津市", region: "kinki" },
  { pref: "滋賀県", capital: "大津市", region: "kinki" },
  { pref: "京都府", capital: "京都市", region: "kinki" },
  { pref: "大阪府", capital: "大阪市", region: "kinki" },
  { pref: "兵庫県", capital: "神戸市", region: "kinki" },
  { pref: "奈良県", capital: "奈良市", region: "kinki" },
  { pref: "和歌山県", capital: "和歌山市", region: "kinki" },
  // 中国・四国
  { pref: "鳥取県", capital: "鳥取市", region: "chugoku" },
  { pref: "島根県", capital: "松江市", region: "chugoku" },
  { pref: "岡山県", capital: "岡山市", region: "chugoku" },
  { pref: "広島県", capital: "広島市", region: "chugoku" },
  { pref: "山口県", capital: "山口市", region: "chugoku" },
  { pref: "徳島県", capital: "徳島市", region: "chugoku" },
  { pref: "香川県", capital: "高松市", region: "chugoku" },
  { pref: "愛媛県", capital: "松山市", region: "chugoku" },
  { pref: "高知県", capital: "高知市", region: "chugoku" },
  // 九州・沖縄
  { pref: "福岡県", capital: "福岡市", region: "kyushu" },
  { pref: "佐賀県", capital: "佐賀市", region: "kyushu" },
  { pref: "長崎県", capital: "長崎市", region: "kyushu" },
  { pref: "熊本県", capital: "熊本市", region: "kyushu" },
  { pref: "大分県", capital: "大分市", region: "kyushu" },
  { pref: "宮崎県", capital: "宮崎市", region: "kyushu" },
  { pref: "鹿児島県", capital: "鹿児島市", region: "kyushu" },
  { pref: "沖縄県", capital: "那覇市", region: "kyushu" },
];

const QUIZ_COUNT = 10;

let questions = [];
let currentIndex = 0;
let score = 0;
let missed = [];
let currentMode = "capital";
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(mode) {
  currentMode = mode;
  const region = document.getElementById("region-select").value;
  const pool = region === "all" ? DATA : DATA.filter(d => d.region === region);
  questions = shuffle(pool).slice(0, Math.min(QUIZ_COUNT, pool.length));
  currentIndex = 0;
  score = 0;
  missed = [];

  document.getElementById("screen-title").style.display = "none";
  document.getElementById("screen-result").style.display = "none";
  document.getElementById("screen-quiz").style.display = "block";
  showQuestion();
}

function showQuestion() {
  answered = false;
  const total = questions.length;
  const q = questions[currentIndex];

  // モード決定
  let isCapitalMode;
  if (currentMode === "capital") isCapitalMode = true;
  else if (currentMode === "prefecture") isCapitalMode = false;
  else isCapitalMode = Math.random() < 0.5;
  q._isCapitalMode = isCapitalMode;

  document.getElementById("progress-text").textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById("score-badge").textContent = `${score}点`;
  document.getElementById("progress-bar").style.width = `${(currentIndex / total) * 100}%`;

  if (isCapitalMode) {
    document.getElementById("question-label").textContent = "都道府県 → 県庁所在地";
    document.getElementById("question-text").textContent = q.pref;
    document.getElementById("question-sub").textContent = "の県庁所在地はどこ？";
  } else {
    document.getElementById("question-label").textContent = "県庁所在地 → 都道府県";
    document.getElementById("question-text").textContent = q.capital;
    document.getElementById("question-sub").textContent = "が県庁所在地の都道府県はどれ？";
  }

  // 選択肢：正解1 + ランダム3
  const correctAnswer = isCapitalMode ? q.capital : q.pref;
  const wrongPool = DATA.filter(d => d.pref !== q.pref);
  const wrongs = shuffle(wrongPool).slice(0, 3).map(d => isCapitalMode ? d.capital : d.pref);
  const choices = shuffle([correctAnswer, ...wrongs]);

  const container = document.getElementById("choices");
  container.innerHTML = "";
  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = c;
    btn.onclick = () => selectAnswer(btn, c, correctAnswer, q, isCapitalMode);
    container.appendChild(btn);
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
}

function selectAnswer(btn, selected, correct, q, isCapitalMode) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll(".choice-btn");
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add("correct");
  });

  const fb = document.getElementById("feedback");
  if (selected === correct) {
    score++;
    btn.classList.add("correct");
    fb.textContent = "⭕ 正解！";
    fb.className = "feedback ok show";
  } else {
    btn.classList.add("wrong");
    fb.textContent = `❌ 不正解… 正解は「${correct}」`;
    fb.className = "feedback ng show";
    missed.push({ q, isCapitalMode });
  }

  document.getElementById("score-badge").textContent = `${score}点`;

  setTimeout(() => {
    currentIndex++;
    if (currentIndex < questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }, 1200);
}

function showResult() {
  document.getElementById("screen-quiz").style.display = "none";
  document.getElementById("screen-result").style.display = "block";

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  let icon, title;
  if (pct === 100) { icon = "🏆"; title = "パーフェクト！！！"; }
  else if (pct >= 80) { icon = "🎉"; title = "すごい！よくできました！"; }
  else if (pct >= 60) { icon = "😊"; title = "なかなかいいね！"; }
  else if (pct >= 40) { icon = "😅"; title = "もう少し！練習しよう"; }
  else { icon = "😢"; title = "がんばれ！また挑戦！"; }

  document.getElementById("result-icon").textContent = icon;
  document.getElementById("result-title").textContent = title;
  document.getElementById("result-score").textContent = `${score} / ${total}`;
  document.getElementById("stat-ok").textContent = score;
  document.getElementById("stat-ng").textContent = total - score;
  document.getElementById("stat-pct").textContent = pct + "%";

  const missedSection = document.getElementById("missed-section");
  const missedList = document.getElementById("missed-list");
  missedList.innerHTML = "";

  if (missed.length === 0) {
    missedSection.style.display = "none";
  } else {
    missedSection.style.display = "block";
    missed.forEach(({ q, isCapitalMode }) => {
      const div = document.createElement("div");
      div.className = "missed-item";
      if (isCapitalMode) {
        div.innerHTML = `<b>${q.pref}</b><span>→ ${q.capital}</span>`;
      } else {
        div.innerHTML = `<b>${q.capital}</b><span>→ ${q.pref}</span>`;
      }
      missedList.appendChild(div);
    });
  }
}

function retryQuiz() {
  startQuiz(currentMode);
}

function goTitle() {
  document.getElementById("screen-result").style.display = "none";
  document.getElementById("screen-title").style.display = "block";
}
</script>
</body>
</html>
